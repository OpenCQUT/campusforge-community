services:
  postgres:
    image: postgres:16-alpine
    container_name: campusforge-postgres
    environment:
      POSTGRES_USER: campusforge
      POSTGRES_PASSWORD: campusforge
      POSTGRES_DB: campusforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campusforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campusforge-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
