openapi: 3.1.0
info:
  title: CampusForge API
  version: 0.1.0
servers:
  - url: http://localhost:4000/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: campusforge-api
                  version:
                    type: string
                    example: "0.1.0"
  /applications:
    post:
      summary: Submit an invitation application
      parameters:
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplication"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          description: Invalid request
        "409":
          description: User already has an application
    get:
      summary: List all applications (admin)
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Application"
                  total:
                    type: integer
  /applications/me:
    get:
      summary: Get own application
      parameters:
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: No application found
  /applications/{id}:
    get:
      summary: Get application by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Application found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Application not found
  /applications/{id}/review:
    patch:
      summary: Review an application (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-user-id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewApplication"
      responses:
        "200":
          description: Application reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "404":
          description: Application not found
        "409":
          description: Invalid review status transition
components:
  schemas:
    CreateApplication:
      type: object
      required: [schoolEmail, studentId, department, reason]
      properties:
        schoolEmail:
          type: string
          format: email
        studentId:
          type: string
        department:
          type: string
        reason:
          type: string
          minLength: 10
          maxLength: 1000
    ReviewApplication:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [APPROVED, REJECTED, NEEDS_INFO]
        reviewReason:
          type: string
          maxLength: 1000
    Application:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        schoolEmail:
          type: string
        studentId:
          type: string
        department:
          type: string
        reason:
          type: string
        status:
          type: string
          enum: [DRAFT, SUBMITTED, VERIFYING, UNDER_REVIEW, APPROVED, REJECTED, NEEDS_INFO]
        reviewerId:
          type: string
          nullable: true
        reviewReason:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
